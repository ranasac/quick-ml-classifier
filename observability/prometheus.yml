global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: fraud-classifier
    static_configs:
      - targets:
          - fraud-classifier:8080   # inference service /metrics endpoint
    metrics_path: /metrics

  - job_name: kafka-producer
    static_configs:
      - targets:
          - kafka-producer:9091

  - job_name: kafka-consumer
    static_configs:
      - targets:
          - kafka-consumer:9092

  - job_name: mlflow
    static_configs:
      - targets:
          - mlflow:5000
    metrics_path: /metrics
